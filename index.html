    <title>The Most Complete PC Download Center</title>
    <style>
        :root {
            /* */
            --box-width: 550px;   /* */
            --box-height: 380px;  /* */
            
            /* */
            --bg-body: #000000;
            --bg-card: #111111;
            --accent: #006330;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* */
        header {
            text-align: center;
            padding: 60px 20px;
        }

        header h1 { font-size: 2rem; margin: 0; }
        header h2 { font-size: 1rem; margin: 0; }
        header p { color: var(--text-dim); margin-top: 5px; }

        /* */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
            padding-bottom: 80px;
        }

        /* */
        .post-box {
            background-color: var(--bg-card);
            width: var(--box-width);
            /* */
            min-height: var(--box-height); 
            border-radius: 15px;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* */
            text-align: center;
            border: 2px solid #222;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            overflow: hidden;
        }

        /* */
        .post-box:hover {
            transform: scale(1.03);
            border-color: #444444;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.2);
        }

        /* */
        .post-title {
            font-size: 1.6rem;
            margin: 0 0 15px 0;
        }
        .post-title a {
            color: var(--text-main);
            text-decoration: none;
        }

        /* */
        .post-image {
            width: 450px;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            flex-shrink: 0; /* */
        }

        /* */
        .post-description {
            color: var(--text-dim);
            font-size: 1rem;
            line-height: 1.5;
            margin: 0 0 20px 0;
            max-width: 450px;
        }

        /* */
        .btn-download {
            background-color: var(--accent);
            color: white;
            padding: 12px 35px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }
        .btn-download:hover { background-color: #7a7a80; }

        /* */
        footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
            color: #444;
            width: 100%;
            border-top: 1px solid #111;
        }

        /* */
        @media (max-width: 950px) {
            :root { --box-width: 95%; --box-height: auto; }
            .post-image { width: 100%; height: auto; }
        }
    </style>
